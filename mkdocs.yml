site_name: BlueprintX
site_description: Documentation for BlueprintX scaffolds (Python and TypeScript)
site_url: https://github.com/guilhermegor/BlueprintX
repo_url: https://github.com/guilhermegor/BlueprintX
# Non-published docs are excluded from the built site so they never reach users:
#   backlog/     — work-to-do backlogs (e.g. template backport notes)
#   superpowers/ — internal specs and plans
exclude_docs: |
  backlog/
  superpowers/
  blueprintx-lessons.md
nav:
  - Home: index.md
  - Get Started: get-started.md
  - Python:
      - DDD Service (Native DB):
          - Overview: py-ddd-service-native-db.md
          - Example - External API Calls: py-examples/ddd-external-api.md
          - Example - Wiring with FastAPI: py-examples/ddd-usage-examples.md
          - Example - Bank Balance Alert: py-examples/ddd-bank-balance-alert.md
      - DDD Service (ORM DB):
          - Overview: py-ddd-service-orm-db.md
          - Example - Usage with SQLAlchemy: py-examples-orm/ddd-orm-usage-examples.md
          - Example - External API Calls: py-examples-orm/ddd-orm-external-api.md
          - Example - Bank Balance Alert: py-examples-orm/ddd-orm-bank-balance-alert.md
      - MVC Service (Native DB):
          - Overview: py-mvc-service-native-db.md
      - MVC Service (ORM DB):
          - Overview: py-mvc-service-orm-db.md
      - Lib Minimal: py-lib-minimal.md
  - TypeScript:
      - React SPA (Webpack): ts-react-spa-webpack.md
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
