# Shipped paths for BlueprintX — one path/glob per line, '#' comments ignored.
#
# Read by the release tooling (release_dispatch_guard.sh, release_due_nudge.sh, the release
# skill) to answer "did the SHIPPED artifact change since the last tag?". Without this file
# they fall back to the Python-package default (src/ + pyproject.toml, bin/ EXCLUDED) — which
# is inverted for this repo and makes every real template change look like "ci/docs only",
# silently suppressing releases instead of failing loudly.
#
# Ground truth is the packaging manifest: .github/workflows/release_apt.yml builds the artifact with
#   cp -r /tmp/bpx-src/bin       pkg/usr/share/blueprintx/
#   cp -r /tmp/bpx-src/templates pkg/usr/share/blueprintx/
# so these two directories ARE the product. Keep this file in sync with that manifest.

# The scaffolder itself (menu, mode parsing, per-skeleton scaffold scripts, shared libs).
bin/

# Everything copied into a generated project — the actual deliverable of a scaffolding tool.
templates/

# NOT shipped (deliberately absent): .github/, docs/, tests/, Makefile, tasks.sh, and the root
# pyproject.toml (docs-only stub, pinned at 0.0.0 by bin/ci/check_version_sync.sh).
