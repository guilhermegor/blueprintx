# mypy configuration — standalone per-tool config (like ruff.toml / .codespellrc),
# not a pyproject [tool.mypy] block. See CLAUDE.md "Tooling".
[mypy]
# The app imports modules by their bare names (utils.x, model.x, …) from src/ —
# mirror the pytest `pythonpath = . src` layout so mypy resolves them the same way
# and never sees a module under two roots.
mypy_path = src
files = src
explicit_package_bases = True
namespace_packages = True
python_version = 3.12

# Many data/vendor libs ship no type stubs (pandas, openpyxl, stpstone, DB drivers);
# don't fail on their missing types.
ignore_missing_imports = True

# Pragmatic baseline (not --strict): enforce annotations and obvious type errors
# without drowning in the runtime-TypeChecker metaclass machinery. Tighten later.
check_untyped_defs = True
warn_unused_ignores = True
warn_redundant_casts = True
