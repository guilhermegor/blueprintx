<?xml version="1.0" encoding="UTF-8"?>
<!-- Initial placeholder so the README ![Test Coverage](./coverage.svg) badge resolves on the
     first push instead of 404-ing. Regenerated with a real percentage by the `coverage-badge`
     pre-commit hook (genbadge) / `make test_cov` once tests run. -->
<svg xmlns="http://www.w3.org/2000/svg" width="122" height="20" role="img" aria-label="coverage: n/a">
  <title>coverage: n/a</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="122" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="77" height="20" fill="#555"/>
    <rect x="77" width="45" height="20" fill="#9f9f9f"/>
    <rect width="122" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="110" text-rendering="geometricPrecision">
    <text aria-hidden="true" x="395" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="670">coverage</text>
    <text x="395" y="140" transform="scale(.1)" fill="#fff" textLength="670">coverage</text>
    <text aria-hidden="true" x="985" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="350">n/a</text>
    <text x="985" y="140" transform="scale(.1)" fill="#fff" textLength="350">n/a</text>
  </g>
</svg>
