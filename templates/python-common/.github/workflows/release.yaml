name: Release
# Cut a versioned release for this service: create the vX.Y.Z tag and a GitHub Release.
# Services are deployed, not published to a package index — there is no PyPI step. The tag is
# what the docs workflow's `cz changelog` groups the changelog by. main is protected; this runs
# server-side with the built-in GITHUB_TOKEN, so no direct push to main is needed.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.4.0 (no leading v)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"; exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes

  # Versioned docs — runs ONLY after the tag/release is cut, so the site never advertises a
  # version that failed to ship. mike deploys the released X.Y to the gh-pages branch under the
  # `latest` alias and makes it the default, giving Material a version dropdown. Services carry
  # no PyPI step, so this gates on the tag job rather than a publish. GitHub Pages must serve
  # from the gh-pages branch (`make enable_pages`). A prerelease (suffix like a1/b1/rc1/-alpha)
  # is skipped in-step so it never moves `latest`.
  deploy_docs:
    name: Deploy Versioned Docs (mike)
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Full history so mike can read/rewrite the existing gh-pages version tree.
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true
          virtualenvs-create: true

      - name: Install Docs Dependencies
        run: poetry install --with docs

      # Regenerate CHANGELOG.md from the commit/tag history so the versioned site mike
      # publishes reflects the tag just cut (cz derives sections from git tags). Not committed
      # back to protected main — mike builds the site from this fresh working-tree copy.
      - name: Regenerate CHANGELOG.md
        run: poetry run cz changelog

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Docs with mike
        run: |
          # A suffixed prerelease (1.0.0rc1, 1.0.0-alpha1) builds a tag but must NOT move
          # `latest`; only a bare X.Y.Z deploys versioned docs. Version dropdown granularity is
          # X.Y, so 1.4.2 and 1.4.7 share the "1.4" entry; `latest` always tracks the newest.
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Prerelease '$VERSION' — skipping versioned-docs deploy."
            exit 0
          fi
          MINOR_VERSION="$(echo "$VERSION" | cut -d. -f1-2)"
          poetry run mike deploy --update-aliases --push "$MINOR_VERSION" latest
          poetry run mike set-default --push latest
