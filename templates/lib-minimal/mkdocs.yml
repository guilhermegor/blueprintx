site_name: ${PROJECT_DISPLAY_NAME}
site_description: Documentation for ${PROJECT_DISPLAY_NAME}
repo_url: ${REPOSITORY}
nav:
  - Home: index.md
  - Usage: usage.md
  - API Reference: api.md
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
