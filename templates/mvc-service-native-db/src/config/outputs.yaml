# Output path configuration. Outputs land under: <output_dir>/<YYYY-MM-DD>/
# output_dir is the single root for run outputs — relative, absolute POSIX, or a
# Windows UNC path. For a Windows UNC path use SINGLE quotes so backslashes stay
# literal, e.g. output_dir: '\\server\share\Team\DAILY INFOS'. To group runs under
# a named level, bake it into output_dir (e.g. "logs/daily_infos").
# Filename templates take, in order: app-name (kebab), user, YYYYMMDD, HHMMSS.
output_dir: "logs"
path_log: "log-{}_{}_{}_{}.txt"
path_json: "{}_{}_{}_{}.json"
path_report: "{}_{}_{}_{}.xlsx"
