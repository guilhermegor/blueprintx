# Alembic configuration file.

[alembic]
script_location = %(here)s/alembic

# Migration filename template — datetime prefix for readability, order resolved by down_revision
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Add . and src/ to sys.path so alembic can import application modules
prepend_sys_path = .:src

path_separator = os

# sqlalchemy.url is overridden at runtime by env.py (reads DB_DSN or composes from env vars)
sqlalchemy.url = %(DB_DSN)s


# ─── LOGGING ──────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
