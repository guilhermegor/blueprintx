<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Inline SVG favicon (data URI) — avoids a 404 with no extra asset
         pipeline. The scaffold has no CopyWebpackPlugin, so a public/
         favicon file would not be emitted to dist/. Replace with your
         own brand mark when ready. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23111827'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%23ffffff'/%3E%3C/svg%3E"
    />
    <title>App</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
