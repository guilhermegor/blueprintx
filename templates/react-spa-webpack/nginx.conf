# nginx server block for the built SPA (used by the Dockerfile serve stage).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted build assets ([contenthash] in their name) can be cached
    # forever — a content change produces a new filename, so this never serves
    # stale code.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for any unmatched path so client-side
    # routes (e.g. /about) resolve on a direct load or refresh. Mirrors the dev
    # server's historyApiFallback and the deploy workflow's 404.html copy.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
