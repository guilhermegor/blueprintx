site_name: ${PROJECT_DISPLAY_NAME}
site_description: Documentation for ${PROJECT_DISPLAY_NAME}
repo_url: ${REPOSITORY}
nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference: api.md
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

# Non-published docs: MkDocs builds every .md under docs/, so working
# documents must be excluded here or they ship to readers.
exclude_docs: |
  backlog/                # work-to-do backlogs / follow-up notes
  superpowers/            # design specs / working notes, not published
  CLAUDE.md               # docs/ authoring guidance, not a published page
  checkpoints.md          # offline merge-checkpoint log, internal
  blueprintx-lessons.md   # git-ignored scaffolding-lessons record, never published
