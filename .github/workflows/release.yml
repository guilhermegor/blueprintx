name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      # Single source of the version: the release input. Bake it into the two version literals
      # (bin/blueprintx.sh + pyproject.toml) and commit to main BEFORE tagging, so the tag's
      # archive tarball — which Homebrew/Chocolatey/Snap/apt install from — carries the correct
      # `blueprintx --version`. This removes the need for a manual `make bump_version` before a
      # release (that recipe stays only as an optional local convenience). Matches the existing
      # release pattern where the packaging jobs already commit manifest bumps to main.
      - name: Bump version literals to the released version
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          sed -i "s/^BLUEPRINTX_VERSION=\".*\"/BLUEPRINTX_VERSION=\"${VERSION}\"/" bin/blueprintx.sh
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/blueprintx.sh pyproject.toml
          if git diff --cached --quiet; then
            echo "Version already at ${VERSION}; nothing to bump."
          else
            git commit -m "chore(release): bump version to v${VERSION}"
            git push origin HEAD:main
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git tag -a "v${VERSION}" -m "release: v${VERSION}"
          git push origin "v${VERSION}"

  homebrew:
    needs: tag
    uses: ./.github/workflows/release_homebrew.yml
    permissions:
      contents: write
    with:
      version: ${{ github.event.inputs.version }}

  chocolatey:
    needs: tag
    uses: ./.github/workflows/release_chocolatey.yml
    permissions:
      contents: write
    with:
      version: ${{ github.event.inputs.version }}

  apt:
    needs: tag
    uses: ./.github/workflows/release_apt.yml
    permissions:
      contents: write
    with:
      version: ${{ github.event.inputs.version }}
    secrets:
      APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
      APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
      APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}

  snap:
    needs: tag
    uses: ./.github/workflows/release_snap.yml
    permissions:
      contents: write
    with:
      version: ${{ github.event.inputs.version }}
    secrets:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
