name: Docs - Github Page Deployment
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write
jobs:
  deploy_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `cz changelog` sees the tags when regenerating CHANGELOG.md.
          fetch-depth: 0
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material commitizen
      # Regenerate CHANGELOG.md from the commit/tag history so the published Changelog page is
      # current (the page single-sources it via a snippets include). Never committed back to main;
      # the site's copy is produced fresh here. cz derives sections from git tags.
      - run: cz changelog
      - run: mkdocs build
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-docs
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync docs preserving apt/
        run: rsync -av --delete --exclude='.git' --exclude='apt/' site/ gh-pages-docs/
      - name: Push to gh-pages
        run: |
          cd gh-pages-docs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git diff-index --quiet HEAD -- || git commit -m "docs: deploy mkdocs site"
          git push origin HEAD:gh-pages
